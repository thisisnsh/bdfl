name: Feature request
description: Propose a BDFL improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which workflow or safety boundary needs improvement?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired host behavior and recovery implications.
    validations:
      required: true

