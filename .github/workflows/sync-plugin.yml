name: Packaged plugin drift

on:
  pull_request:
    paths:
      - "src/**"
      - "skills/**"
      - "plugins/**"
      - "scripts/package.js"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run package:check
