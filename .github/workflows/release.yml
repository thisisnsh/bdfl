name: Publish bdfl

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.15.0
      - name: Show publishing toolchain
        run: node --version && npm --version
      - run: npm ci
      - name: Resolve staging base from latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)
          RELEASE_TAG="$release_tag" node <<'NODE'
          const fs = require('node:fs');
          const semver = require('semver');
          const tag = process.env.RELEASE_TAG || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '';
          if (!semver.valid(version) || semver.prerelease(version)) {
            throw new Error(`Latest GitHub Release must use stable v-prefixed SemVer: ${tag}`);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `STAGING_BASE_VERSION=${version}\n`);
          NODE
      - run: npm test
      - run: npm run validate
      - name: Build staging package
        id: pack
        run: |
          short_sha="${GITHUB_SHA::7}"
          npm version "${STAGING_BASE_VERSION}-staging.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${short_sha}" --no-git-tag-version --allow-same-version
          tarball=$(npm pack --json | node -e 'let value=""; process.stdin.on("data", chunk => value += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(value)[0].filename));')
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > SHA256SUMS
      - run: npm publish "${{ steps.pack.outputs.tarball }}" --tag staging --provenance --access public
      - uses: actions/upload-artifact@v4
        with:
          name: bdfl-staging-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            *.tgz
            SHA256SUMS
          retention-days: 14

  production-test:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - name: Resolve version from GitHub Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const semver = require('semver');
          const tag = process.env.RELEASE_TAG || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '';
          if (!semver.valid(version) || semver.prerelease(version)) {
            throw new Error(`Production release tag must be a stable v-prefixed SemVer: ${tag}`);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Stamp ephemeral package version
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
      - run: npm test
      - run: npm run validate

  production:
    if: github.event_name == 'release'
    needs: production-test
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.15.0
      - name: Show publishing toolchain
        run: node --version && npm --version
      - run: npm ci
      - name: Resolve version from GitHub Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const semver = require('semver');
          const tag = process.env.RELEASE_TAG || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '';
          if (!semver.valid(version) || semver.prerelease(version)) {
            throw new Error(`Production release tag must be a stable v-prefixed SemVer: ${tag}`);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Stamp ephemeral package version
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
      - name: Build release evidence
        id: pack
        run: |
          tarball=$(npm pack --json | node -e 'let value=""; process.stdin.on("data", chunk => value += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(value)[0].filename));')
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          sha256sum "$tarball" > SHA256SUMS
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json
      - name: Publish latest
        run: npm publish "${{ steps.pack.outputs.tarball }}" --tag latest --provenance --access public
      - name: Attach release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "${{ steps.pack.outputs.tarball }}" SHA256SUMS sbom.cdx.json SUPPORT.md
