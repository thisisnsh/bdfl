name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Read version from tag
        run: npm run release:version -- "$GITHUB_REF_NAME"
      - run: npm run package
      - run: npm test
      - run: npm run validate
      - name: Build archives
        run: |
          mkdir artifacts
          tar --exclude=.git --exclude=.bdfl --exclude=artifacts -czf artifacts/bdfl.tar.gz .
          zip -qr artifacts/bdfl.zip . -x '.git/*' '.bdfl/*' 'artifacts/*'
          cp install.sh install.ps1 uninstall.sh uninstall.ps1 artifacts/
          cd artifacts
          sha256sum bdfl.tar.gz bdfl.zip install.sh install.ps1 uninstall.sh uninstall.ps1 > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
